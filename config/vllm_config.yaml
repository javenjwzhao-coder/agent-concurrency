native:
  # Ascend env setup scripts
  ascend_toolkit_path: /usr/local/Ascend/ascend-toolkit/set_env.sh
  atb_path:            /usr/local/Ascend/nnal/atb/set_env.sh
  shared_venv_python:  /opt/vllm/venv/bin/python
  workdir:             /root/jwzhao

  # NPU device indices for ASCEND_RT_VISIBLE_DEVICES
  devices: "0,1"

  # vllm serve arguments — mirrors existing reasoning: block
  model_path:           /opt/data/Model/Qwen3/Qwen3-32B
  served_model_name:    qwen3-32b
  host:                 127.0.0.1
  port:                 8027
  api_key:              sk-local-ascend
  tensor_parallel_size: 2
  dtype:                bfloat16
  extra_args: >-
    --block-size 128
    --gpu-memory-utilization 0.95
    --max-num-seqs 32
    --max-num-batched-tokens 32768
    --enable-auto-tool-choice
    --tool-call-parser hermes

  pid_file: /tmp/vllm_native.pid

# Model geometry for sidecar.py KV block → GB conversion.
# Source: Qwen/Qwen3-30B-A3B config.json
sidecar:
  num_layers: 64        # num_hidden_layers
  num_kv_heads: 8       # num_key_value_heads (GQA)
  head_dim: 128         # explicitly set in model config (not hidden_size / num_attention_heads)
  block_size: 128       # vLLM default; change if --block-size is passed to vllm serve
  dtype: "bfloat16"     # must match native.dtype
