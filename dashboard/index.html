<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Agent Concurrency · Live</title>
  <link id="dashboardCssAsset" rel="stylesheet" href="static/dashboard.css">
  <!--
    vis-timeline (includes both Timeline and Graph2D) is loaded from a CDN.
    If the dashboard host has no internet, download these two files into
    ./static/ and change the two URLs below to /static/<filename>:
      https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.css
      https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js
  -->
  <link id="visCssAsset" rel="stylesheet"
        href="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.css">
  <script>
    (function () {
      function showAssetError(asset) {
        var status = document.getElementById("connStatus");
        if (status) {
          status.textContent = "offline asset missing: " + asset;
          status.className = "status status-error";
        }
        var main = document.querySelector("main");
        if (main && !document.getElementById("offlineAssetError")) {
          main.innerHTML = '<section id="offlineAssetError" class="offline-fallback">' +
            '<h2>Dashboard asset missing</h2>' +
            '<p>This HTML file was opened without the JavaScript/CSS assets needed to run it. ' +
            'For an offline snapshot, open the live dashboard and use the Save standalone HTML button.</p>' +
            '</section>';
        }
      }
      window.addEventListener("error", function (event) {
        var target = event.target;
        if (!target || !target.id) return;
        if (/^(dashboardCssAsset|visCssAsset|visJsAsset|dashboardJsAsset)$/.test(target.id)) {
          showAssetError(target.getAttribute("href") || target.getAttribute("src") || target.id);
        }
      }, true);
    }());
  </script>
</head>
<body>
  <header>
    <h1 id="dashboardTitle">Agent Concurrency · Live</h1>
    <div class="controls">
      <button id="pauseBtn" type="button">Pause auto-scroll</button>
      <button id="eventLinesBtn" type="button" aria-pressed="false">Hide event lines</button>
      <button id="replayBtn" type="button">Open sidecar.log…</button>
      <button id="saveSnapshotBtn" type="button">Save standalone HTML</button>
      <button id="liveBtn" type="button" hidden>Back to live</button>
      <input id="logFile" type="file" accept=".log,.jsonl,.json,text/plain"
             style="display:none">
      <span id="connStatus" class="status status-pending">connecting…</span>
      <span id="liveCount" class="badge badge-live" style="display:none">live: 0</span>
      <span id="offloadedCount" class="badge badge-offloaded" style="display:none">offloaded: 0</span>
      <span id="heapCount" class="badge badge-heap" style="display:none">heap: 0</span>
      <span id="pressureBadge" class="badge badge-pressure" style="display:none">C: n/a / W: n/a</span>
      <span id="queueCount" class="badge badge-queue" style="display:none">queue: 0</span>
      <span id="doneCount" class="badge badge-done" style="display:none">done: 0</span>
      <span id="vllmPreemptCount" class="badge badge-vllm" style="display:none">vllm preempt: 0</span>
      <span id="tickInfo"></span>
    </div>
    <div class="legend">
      <span class="legend-title">Phase</span>
      <span class="chip phase-reasoning">reasoning</span>
      <span class="chip phase-tool_call">tool_call</span>
      <span class="chip phase-waiting">waiting</span>
      <span class="chip phase-offloaded_waiting">offloaded</span>
      <span class="chip phase-done">done</span>
      <span class="legend-title">Event</span>
      <span class="chip event-offload">OFFLOAD <span id="eventCountOffload" class="event-count">0</span></span>
      <span class="chip event-admit">ADMIT <span id="eventCountAdmit" class="event-count">0</span></span>
      <span class="chip event-readmit">READMIT <span id="eventCountReadmit" class="event-count">0</span></span>
      <span class="chip event-sat">SAT <span id="eventCountSat" class="event-count">0</span></span>
      <span class="legend-title">KV %</span>
      <span class="chip kv-line">vllm kv used</span>
      <span class="chip kv-threshold-line">offload threshold</span>
    </div>
  </header>

  <main>
    <div id="kvChart"></div>
    <div id="timeline"></div>
  </main>

  <script id="visJsAsset" src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <script id="dashboardJsAsset" src="static/dashboard.js"></script>
</body>
</html>
